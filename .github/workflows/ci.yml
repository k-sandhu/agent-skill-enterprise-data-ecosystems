name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  self-test:
    name: self-test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.9"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Engine self-test (determinism + strict validation)
        run: python scripts/run_self_test.py
      - name: Build and strict-validate every worked example
        run: python scripts/validate_all_examples.py --scale-multiplier 0.3
